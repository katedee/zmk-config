include:
  # Sweep
  - board: nice_nano//zmk
    shield: cradio_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: sweep_left_peripheral
  - board: nice_nano//zmk
    shield: cradio_left
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
    artifact-name: sweep_left_central
  - board: nice_nano//zmk
    shield: cradio_right
    cmake-args: -DCONFIG_ZMK_SPLIT=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n
    artifact-name: sweep_right
  - board: nice_nano//zmk
    shield: cradio_dongle
    snippet: studio-rpc-usb-uart
    cmake-args: -DCONFIG_ZMK_STUDIO=y
    artifact-name: sweep_dongle

    # Reset shields
  - board: nice_nano//zmk
    shield: settings_reset
    artifact-name: settings_reset_nice_nano
  - board: xiao_ble//zmk
    shield: settings_reset
    artifact-name: settings_reset_xiao_ble
